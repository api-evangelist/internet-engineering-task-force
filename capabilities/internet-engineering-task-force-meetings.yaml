naftiko: 1.0.0-alpha2
info:
  label: IETF Datatracker API — Meetings
  description: 'IETF Datatracker API — Meetings. 1 operations. Lead operation: Set the video URL for a meeting session recording.
    Self-contained Naftiko capability covering one Internet Engineering Task Force business surface.'
  tags:
  - Internet Engineering Task Force
  - Meetings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INTERNET_ENGINEERING_TASK_FORCE_API_KEY: INTERNET_ENGINEERING_TASK_FORCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: internet-engineering-task-force-meetings
    baseUri: https://datatracker.ietf.org
    description: IETF Datatracker API — Meetings business capability. Self-contained, no shared references.
    resources:
    - name: api-meeting-session-video-url
      path: /api/meeting/session/video/url
      operations:
      - name: setsessionvideourl
        method: POST
        description: Set the video URL for a meeting session recording
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: apikey
      value: '{{env.INTERNET_ENGINEERING_TASK_FORCE_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: internet-engineering-task-force-meetings-rest
    port: 8080
    description: REST adapter for IETF Datatracker API — Meetings. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/meeting/session/video/url
      name: api-meeting-session-video-url
      description: REST surface for api-meeting-session-video-url.
      operations:
      - method: POST
        name: setsessionvideourl
        description: Set the video URL for a meeting session recording
        call: internet-engineering-task-force-meetings.setsessionvideourl
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: internet-engineering-task-force-meetings-mcp
    port: 9090
    transport: http
    description: MCP adapter for IETF Datatracker API — Meetings. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: set-video-url-meeting-session
      description: Set the video URL for a meeting session recording
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: internet-engineering-task-force-meetings.setsessionvideourl
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
