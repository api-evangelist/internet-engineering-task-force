naftiko: 1.0.0-alpha2
info:
  label: IETF Datatracker API — Identity
  description: 'IETF Datatracker API — Identity. 1 operations. Lead operation: OpenID Connect issuer configuration. Self-contained
    Naftiko capability covering one Internet Engineering Task Force business surface.'
  tags:
  - Internet Engineering Task Force
  - Identity
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INTERNET_ENGINEERING_TASK_FORCE_API_KEY: INTERNET_ENGINEERING_TASK_FORCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: internet-engineering-task-force-identity
    baseUri: https://datatracker.ietf.org
    description: IETF Datatracker API — Identity business capability. Self-contained, no shared references.
    resources:
    - name: api-openid
      path: /api/openid/
      operations:
      - name: getopenidconfig
        method: GET
        description: OpenID Connect issuer configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: apikey
      value: '{{env.INTERNET_ENGINEERING_TASK_FORCE_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: internet-engineering-task-force-identity-rest
    port: 8080
    description: REST adapter for IETF Datatracker API — Identity. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/openid
      name: api-openid
      description: REST surface for api-openid.
      operations:
      - method: GET
        name: getopenidconfig
        description: OpenID Connect issuer configuration
        call: internet-engineering-task-force-identity.getopenidconfig
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: internet-engineering-task-force-identity-mcp
    port: 9090
    transport: http
    description: MCP adapter for IETF Datatracker API — Identity. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: openid-connect-issuer-configuration
      description: OpenID Connect issuer configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: internet-engineering-task-force-identity.getopenidconfig
      outputParameters:
      - type: object
        mapping: $.
