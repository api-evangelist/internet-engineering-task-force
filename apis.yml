apis:
  - aid: internet-engineering-task-force:ietf-datatracker-api
    name: IETF Datatracker API
    description: >-
      The IETF Datatracker REST API provides programmatic, read-only access to IETF data including documents, RFCs,
      drafts, working groups, meetings, IPR disclosures, and IESG ballot positions. Responses are returned as JSON or
      XML. Public endpoints require no authentication.
    humanURL: https://datatracker.ietf.org/api/
    baseURL: https://datatracker.ietf.org/api/v1/
    tags:
      - Internet
      - RFC
      - Standards
      - Working Groups
    properties:
      - type: Documentation
        url: https://datatracker.ietf.org/api/
      - type: SignUp
        url: https://datatracker.ietf.org/accounts/login/
      - url: openapi/internet-engineering-task-force-openapi.yml
        type: OpenAPI
  - aid: internet-engineering-task-force:rfc-editor
    name: RFC Editor
    description: >-
      The RFC Editor publishes the canonical RFC series in multiple formats (TXT, HTML, PDF, XML) and provides bulk and
      machine-readable indexes of RFCs and Internet-Drafts.
    humanURL: https://www.rfc-editor.org/
    baseURL: https://www.rfc-editor.org/
    tags:
      - RFC
      - Standards
    properties:
      - type: Documentation
        url: https://www.rfc-editor.org/retrieve/
      - type: Bulk
        url: https://www.rfc-editor.org/in-notes/rfc-index.xml
