aid: internet-engineering-task-force
name: Internet Engineering Task Force
description: >-
  The Internet Engineering Task Force (IETF) is an open, global community of
  network designers, engineers, researchers, and operators that develops and
  promotes voluntary technical standards to ensure the smooth operation and
  evolution of the internet. The IETF publishes freely accessible RFCs (Requests
  for Comments) that serve as the foundation for internet interoperability.
