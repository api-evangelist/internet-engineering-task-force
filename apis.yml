aid: internet-engineering-task-force
name: Internet Engineering Task Force
description: >-
  The Internet Engineering Task Force (IETF) is an open, global community of network designers, engineers, researchers,
  and operators that develops and promotes voluntary technical standards to ensure the smooth operation and evolution of
  the internet. The IETF publishes freely accessible RFCs (Requests for Comments) that serve as the foundation for
  internet interoperability. The IETF Datatracker exposes a public read-only REST API over the working group, document,
  and meeting data managed by the IETF.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
